# Repository Orientation
# Quick reference for navigating each repo without full exploration

odd-platform:
  path: "../odd-platform"
  tech: "Java 17, Spring Boot 3.1, WebFlux, R2DBC, JOOQ, PostgreSQL, React 18, TypeScript, Redux Toolkit, Vite"
  structure:
    backend_root: "odd-platform-api/src/main/java/org/opendatadiscovery/oddplatform"
    controllers: "{backend_root}/controller/"
    services: "{backend_root}/service/"
    repositories: "{backend_root}/repository/reactive/"
    mappers: "{backend_root}/mapper/"
    auth: "{backend_root}/auth/"
    migrations: "odd-platform-api/src/main/resources/db/migration/"
    backend_tests: "odd-platform-api/src/test/java/"
    frontend_root: "odd-platform-ui/src"
    components: "{frontend_root}/components/"
    redux: "{frontend_root}/redux/"
    routes: "{frontend_root}/routes/"
    generated_api: "{frontend_root}/generated-sources/"
    openapi_spec: "odd-platform-specification/openapi.yaml"
    e2e_tests: "tests/"
  commands:
    build: "./gradlew build"
    test_backend: "./gradlew odd-platform-api:test"
    test_frontend: "cd odd-platform-ui && pnpm test"
    test_e2e: "cd tests && npm run test:ci"
    lint_backend: "./gradlew checkstyle"
    lint_frontend: "cd odd-platform-ui && pnpm lint"
  notes:
    - "Controllers implement generated interfaces from odd-platform-api-contract"
    - "JOOQ models are generated from DB schema (./gradlew jooqDockerGenerate)"
    - "Frontend API client generated from OpenAPI spec (cd odd-platform-ui && pnpm generate)"

odd-collectors:
  path: "../odd-collectors"
  tech: "Python 3.9, Poetry, Pydantic, APScheduler, testcontainers"
  structure:
    generic: "odd-collector/odd_collector/"
    aws: "odd-collector-aws/odd_collector_aws/"
    azure: "odd-collector-azure/odd_collector_azure/"
    gcp: "odd-collector-gcp/odd_collector_gcp/"
    sdk: "odd-collector-sdk/odd_collector_sdk/"
    adapters: "{collector}/adapters/{adapter_name}/adapter.py"
    plugins: "{collector}/domain/plugin.py"
    tests: "{collector}/tests/"
    configs: "{collector}/config_examples/"
  commands:
    install: "cd {collector} && poetry install"
    test: "cd {collector} && poetry run pytest ./tests -v"
    test_integration: "cd {collector} && poetry run pytest ./tests -v -m integration"
    lint: "make lint"
  notes:
    - "Adapter must be named 'Adapter' in adapters/{name}/adapter.py"
    - "Plugin type literal must match adapter directory name"
    - "SDK orchestrates: config → dynamic import → schedule → extract → send"

opendatadiscovery-specification:
  path: "../opendatadiscovery-specification"
  tech: "OpenAPI YAML, JSON Schema"
  structure:
    spec_root: "specification/"
  notes:
    - "Defines the Ingress API contract that collectors and platform implement"
    - "ODDRN format specification lives here"

documentation:
  path: "../documentation"
  remote: "github.com/opendatadiscovery/documentation"
  tech: "Gitbook, Markdown"
  role: "SINGLE SOURCE OF TRUTH for all user-facing documentation"
  structure:
    root: "docs/"
    summary: "docs/SUMMARY.md"  # Defines gitbook navigation tree
    features: "docs/Features.md"
    architecture: "docs/Architecture.md"
    adapters: "docs/Adapters.md"
    configuration: "docs/configuration-and-deployment/"
    developer_guides: "docs/developer-guides/"
    glossary: "docs/GLOSSARY.md"
  notes:
    - "ALL documentation changes go here — this is the user-facing source of truth"
    - "ADRs, once accepted, are published here"
    - "Feature descriptions, API docs, guides, vision — all live here"
    - "odd-team repo only has agent workspace (pointers, scanners, backlog)"
    - "Gitbook structure defined by SUMMARY.md"

odd-docs:
  path: null
  remote: "github.com/opendatadiscovery/odd-docs"
  tech: "Gitbook, Markdown"
  status: "TO BE MERGED — originally created for DevOps run books"
  notes:
    - "Content should be merged into the documentation repo (single source of truth)"
    - "After merge, this repo can be archived"

# --- Standalone Integrations ---
# These are separate packages that extract metadata from specific tools
# and send it to the ODD Platform (alternative to running via odd-collectors)

odd-great-expectations:
  path: "../odd-great-expectations"
  remote: "github.com/opendatadiscovery/odd-great-expectations"
  tech: "Python, Great Expectations plugin"
  notes:
    - "GE checkpoint action that sends quality results to ODD Platform"
    - "Standalone package — not part of odd-collectors monorepo"

odd-dbt:
  path: null  # Check if local
  remote: "github.com/opendatadiscovery/odd-dbt"
  tech: "Python, dbt plugin"
  notes:
    - "Extracts dbt metadata (models, tests, lineage) and sends to Platform"
    - "Standalone — runs as dbt plugin, not as a collector"

odd-spark-adapter:
  path: null  # Check if local
  remote: "github.com/opendatadiscovery/odd-spark-adapter"
  tech: "Scala/Java, Apache Spark"
  notes:
    - "Spark listener that captures lineage and sends to ODD Platform"
    - "Runs inside Spark job — not a standalone collector"

odd-airflow-2:
  path: null  # Check if local
  remote: "github.com/opendatadiscovery/odd-airflow-2"
  tech: "Python, Apache Airflow 2 plugin"
  notes:
    - "Airflow plugin that reports DAG/task metadata to ODD Platform"
    - "Runs inside Airflow — not a standalone collector"

