# File Registry - Conflict Prevention
# Maps file paths to work item IDs that read or modify them
# Check this BEFORE starting any work item
#
# Format:
#   repo/path/to/file:
#     - ITEM-ID (status) — brief description
#
# Rules:
# - Never start an item if another item touching the same file is "in-progress"
# - Items can share files if one only reads and the other modifies
# - Update this file when creating new work items or changing item status

