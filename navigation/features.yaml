# Master Feature Registry
# Read this FIRST to find where any feature domain lives
# Each domain file is a compact pointer map (<80 lines)

domains:
  data-entities:
    file: domains/data-entities.md
    repos: [odd-platform]
    summary: "Core metadata objects — tables, jobs, pipelines, ML models, dashboards"

  lineage:
    file: domains/lineage.md
    repos: [odd-platform, odd-collectors]
    summary: "Data flow graph — upstream sources, transformations, downstream consumers"

  ingestion:
    file: domains/ingestion.md
    repos: [odd-platform, odd-collectors, opendatadiscovery-specification]
    summary: "Collector → Ingress API → Platform pipeline"

  data-quality:
    file: domains/data-quality.md
    repos: [odd-platform, odd-collectors]
    summary: "SLA monitoring, quality test results, assertions, expectations"

  alerting:
    file: domains/alerting.md
    repos: [odd-platform]
    summary: "Notifications on entity state changes, quality failures, schema drift"

  search:
    file: domains/search.md
    repos: [odd-platform]
    summary: "Full-text and faceted search across all metadata entities"

  glossary:
    file: domains/glossary.md
    repos: [odd-platform]
    summary: "Business terms, definitions, term-to-entity assignments"

  collaboration:
    file: domains/collaboration.md
    repos: [odd-platform]
    summary: "Ownership, tags, labels, discussions, activity feed"

  management:
    file: domains/management.md
    repos: [odd-platform]
    summary: "Namespaces, data sources, collectors, users, roles, permissions"

  lookup-tables:
    file: domains/lookup-tables.md
    repos: [odd-platform]
    summary: "Reference data management — editable lookup tables linked to entities"

  relationships:
    file: domains/relationships.md
    repos: [odd-platform, odd-collectors]
    summary: "ERD/FK relationships between datasets, cross-schema references"

  collectors-sdk:
    file: domains/collectors-sdk.md
    repos: [odd-collectors]
    summary: "Shared SDK — adapter base classes, job scheduling, Platform API client"

  collectors-adapters:
    file: domains/collectors-adapters.md
    repos: [odd-collectors]
    summary: "40+ adapters for databases, BI tools, ML platforms, cloud services"

  specification:
    file: domains/specification.md
    repos: [opendatadiscovery-specification]
    summary: "ODD data model, Ingress API contract, ODDRN format"

  authentication:
    file: domains/authentication.md
    repos: [odd-platform]
    summary: "OAuth2, LDAP, login form, session management, RBAC"

  standalone-integrations:
    file: domains/standalone-integrations.md
    repos: [odd-great-expectations, odd-dbt, odd-spark-adapter, odd-airflow-2]
    summary: "Push-based integrations running inside GE, dbt, Spark, Airflow"

  deployment:
    file: domains/deployment.md
    repos: [charts, odd-platform, odd-examples]
    summary: "Helm charts, Docker configs, deployment guides"

  core-packages:
    file: domains/core-packages.md
    repos: [odd-models-package, opendatadiscovery-specification-contracts, oddrn-generator]
    summary: "Shared libraries — models, ODDRN generator, spec contracts"

# Note: domain files are populated incrementally during audit scans.
# A domain file marked (stub) has been created but not yet filled with pointers.
